<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGNAL LAB</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
  :root{--bg:#040810;--panel:#070d1a;--border:#0d2040;--bull:#00ff88;--bear:#ff2d55;--neutral:#f0b429;--accent:#00c8ff;--text:#a8c8e8;--dim:#3a5570;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,200,255,.012) 2px,rgba(0,200,255,.012) 4px);pointer-events:none;z-index:9999;}
  body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .wrap{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:18px;}
  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
  .logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:20px;color:var(--accent);letter-spacing:4px;}
  .logo span{color:var(--bull);}
  .hdr-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--bull);box-shadow:0 0 8px var(--bull);animation:blink 1.4s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .stxt{font-size:10px;color:var(--dim);}
  .cd{font-size:10px;color:var(--dim);}
  .cd b{color:var(--accent);}
  .rbtn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;padding:6px 16px;background:transparent;border:1px solid var(--accent);color:var(--accent);cursor:pointer;}
  .tokens{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tok{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;padding:8px 20px;border:1px solid var(--border);background:var(--panel);color:var(--dim);cursor:pointer;letter-spacing:2px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);}
  .tok.on{background:rgba(0,200,255,.12);border-color:var(--accent);color:var(--accent);}

/* Price strip */
.price-strip{background:var(–panel);border:1px solid var(–border);padding:20px 24px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;position:relative;overflow:hidden;}
.price-strip::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(–accent),transparent);}
.sym{font-family:‘Orbitron’,sans-serif;font-size:26px;font-weight:900;color:#fff;letter-spacing:2px;}
.sym-sub{font-size:10px;color:var(–dim);letter-spacing:2px;margin-top:3px;}
.pval{font-family:‘Orbitron’,sans-serif;font-size:28px;font-weight:700;color:#fff;}
.pchg{font-size:13px;margin-top:4px;font-weight:bold;}
.pos{color:var(–bull);}.neg{color:var(–bear);}
.metas{display:flex;gap:20px;flex-wrap:wrap;}
.mi{text-align:center;}.ml{font-size:9px;color:var(–dim);margin-bottom:3px;}.mv{font-size:13px;}

/* Overall verdict */
.vbox{background:var(–panel);border:1px solid var(–border);padding:20px;margin-bottom:18px;text-align:center;}
.vt{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:4px;color:var(–dim);margin-bottom:10px;}
.vv{font-family:‘Orbitron’,sans-serif;font-size:32px;font-weight:900;letter-spacing:6px;animation:flicker 5s infinite;}
.vv.BULLISH{color:var(–bull);text-shadow:0 0 40px #00ff8877;}
.vv.BEARISH{color:var(–bear);text-shadow:0 0 40px #ff2d5577;}
.vv.NEUTRAL{color:var(–neutral);text-shadow:0 0 40px #f0b42977;}
@keyframes flicker{0%,93%,100%{opacity:1}94%{opacity:.6}95%{opacity:1}97%{opacity:.4}98%{opacity:1}}
.vs{font-size:11px;color:var(–dim);margin-top:8px;}

/* ── SCALP + DAY TRADE CARDS ── */
.trade-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}
@media(max-width:600px){.trade-grid{grid-template-columns:1fr;}}
.trade-card{background:var(–panel);border:1px solid var(–border);padding:20px;position:relative;overflow:hidden;}
.trade-card::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;}
.trade-card.scalp::before{background:linear-gradient(90deg,transparent,#ff9500,transparent);}
.trade-card.daytrade::before{background:linear-gradient(90deg,transparent,#a855f7,transparent);}
.trade-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.trade-type{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:3px;}
.trade-type.scalp{color:#ff9500;}
.trade-type.daytrade{color:#a855f7;}
.trade-name{font-family:‘Orbitron’,sans-serif;font-size:17px;font-weight:700;color:#fff;margin-top:2px;}
.trade-badge{font-family:‘Orbitron’,sans-serif;font-size:12px;font-weight:700;padding:6px 14px;clip-path:polygon(6px 0%,100% 0%,calc(100% - 6px) 100%,0% 100%);}
.trade-badge.BULLISH{background:rgba(0,255,136,.12);color:var(–bull);border:1px solid var(–bull);box-shadow:0 0 12px #00ff8833;}
.trade-badge.BEARISH{background:rgba(255,45,85,.12);color:var(–bear);border:1px solid var(–bear);box-shadow:0 0 12px #ff2d5533;}
.trade-badge.NEUTRAL{background:rgba(240,180,41,.12);color:var(–neutral);border:1px solid var(–neutral);}
.trade-score-row{display:flex;justify-content:space-between;font-size:10px;color:var(–dim);margin-bottom:4px;}
.trade-bar{height:6px;background:var(–border);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.trade-bar-fill{height:100%;border-radius:3px;transition:width .8s ease;}
.trade-bar-fill.bull{background:linear-gradient(90deg,#00aa55,var(–bull));}
.trade-bar-fill.bear{background:linear-gradient(90deg,#aa0033,var(–bear));}
.trade-bar-fill.neut{background:linear-gradient(90deg,#996600,var(–neutral));}
.trade-signals{display:flex;flex-direction:column;gap:5px;}
.trade-sig-row{display:flex;justify-content:space-between;font-size:10px;padding:4px 0;border-bottom:1px solid rgba(13,32,64,.4);}
.trade-sig-row:last-child{border-bottom:none;}
.tsn{color:var(–dim);}
.tsv{font-weight:bold;}
.tsv.bull{color:var(–bull);}
.tsv.bear{color:var(–bear);}
.tsv.neut{color:var(–neutral);}
.trade-advice{margin-top:12px;padding:10px 12px;font-size:10px;line-height:1.6;border-radius:2px;}
.trade-advice.bull{background:rgba(0,255,136,.06);border-left:2px solid var(–bull);color:#7fffc0;}
.trade-advice.bear{background:rgba(255,45,85,.06);border-left:2px solid var(–bear);color:#ff8099;}
.trade-advice.neut{background:rgba(240,180,41,.06);border-left:2px solid var(–neutral);color:#f5d080;}

/* TF grid */
.tfg{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px;}
.tf{background:var(–panel);border:1px solid var(–border);padding:16px;position:relative;overflow:hidden;}
.tf.bullish{border-color:rgba(0,255,136,.25);}
.tf.bearish{border-color:rgba(255,45,85,.25);}
.tf.neutral{border-color:rgba(240,180,41,.25);}
.tf::after{content:’’;position:absolute;bottom:0;left:0;right:0;height:2px;}
.tf.bullish::after{background:linear-gradient(90deg,transparent,var(–bull),transparent);}
.tf.bearish::after{background:linear-gradient(90deg,transparent,var(–bear),transparent);}
.tf.neutral::after{background:linear-gradient(90deg,transparent,var(–neutral),transparent);}
.tf-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.tfl{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:3px;color:var(–dim);}
.tfp{font-family:‘Orbitron’,sans-serif;font-size:15px;font-weight:700;color:#fff;margin-top:3px;}
.badge{font-family:‘Orbitron’,sans-serif;font-size:10px;font-weight:700;padding:5px 10px;clip-path:polygon(5px 0%,100% 0%,calc(100% - 5px) 100%,0% 100%);}
.badge.BULLISH{background:rgba(0,255,136,.12);color:var(–bull);border:1px solid var(–bull);}
.badge.BEARISH{background:rgba(255,45,85,.12);color:var(–bear);border:1px solid var(–bear);}
.badge.NEUTRAL{background:rgba(240,180,41,.12);color:var(–neutral);border:1px solid var(–neutral);}
.bl{display:flex;justify-content:space-between;font-size:9px;color:var(–dim);margin-bottom:3px;}
.bt{height:3px;background:var(–border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
.bf{height:100%;border-radius:2px;}
.bf.bull{background:linear-gradient(90deg,#00aa55,var(–bull));}
.bf.bear{background:linear-gradient(90deg,#aa0033,var(–bear));}
.bf.neut{background:linear-gradient(90deg,#996600,var(–neutral));}
.tfs{font-size:10px;color:var(–dim);margin-top:6px;}

/* Indicators */
.ig{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:18px;}
.ip{background:var(–panel);border:1px solid var(–border);padding:18px;}
.it{font-family:‘Orbitron’,sans-serif;font-size:10px;letter-spacing:3px;color:var(–accent);margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(–border);}
.ir{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(13,32,64,.5);font-size:11px;}
.ir:last-child{border-bottom:none;}
.in{color:var(–dim);}.iv{color:var(–text);font-size:10px;}
.is{font-weight:bold;font-size:10px;}
.is.bull{color:var(–bull);}.is.bear{color:var(–bear);}.is.neut{color:var(–neutral);}

/* Exhaustion panel */
.exhaust-panel{margin-top:14px;border-top:1px solid var(–border);padding-top:12px;}
.exhaust-title{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:3px;margin-bottom:10px;}
.exhaust-title.top{color:#ff9500;}
.exhaust-title.bot{color:#a855f7;}
.exhaust-title.none{color:var(–dim);}
.exhaust-meter{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.exhaust-bar{flex:1;height:8px;background:var(–border);border-radius:4px;overflow:hidden;}
.exhaust-bar-fill{height:100%;border-radius:4px;transition:width .8s ease;}
.exhaust-bar-fill.low{background:linear-gradient(90deg,#1a3a2a,#2d6644);}
.exhaust-bar-fill.med{background:linear-gradient(90deg,#6b4500,#f0b429);}
.exhaust-bar-fill.hi{background:linear-gradient(90deg,#6b0020,var(–bear));}
.exhaust-pct{font-family:‘Orbitron’,sans-serif;font-size:12px;font-weight:700;min-width:36px;text-align:right;}
.exhaust-pct.low{color:#2d6644;}
.exhaust-pct.med{color:var(–neutral);}
.exhaust-pct.hi{color:var(–bear);}
.urgency-badge{display:inline-block;font-family:‘Orbitron’,sans-serif;font-size:10px;font-weight:700;padding:4px 10px;letter-spacing:1px;margin-bottom:10px;}
.urgency-badge.IMMINENT{background:rgba(255,45,85,.2);color:var(–bear);border:1px solid var(–bear);animation:flicker 1.5s infinite;}
.urgency-badge.VERY\ SOON{background:rgba(240,180,41,.15);color:var(–neutral);border:1px solid var(–neutral);}
.urgency-badge.APPROACHING{background:rgba(240,180,41,.08);color:#c8902a;border:1px solid #c8902a;}
.urgency-badge.WATCH{background:rgba(0,200,255,.08);color:var(–accent);border:1px solid var(–accent);}
.urgency-badge.NO\ SIGNAL{background:rgba(58,85,112,.2);color:var(–dim);border:1px solid var(–dim);}
.exhaust-signs{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.exhaust-sign{font-size:10px;color:#ff9966;padding:2px 0;}
.exhaust-sign::before{content:’⚠ ’;}
.flip-prediction{background:rgba(0,0,0,.3);border:1px solid var(–border);padding:10px 12px;font-size:10px;line-height:1.7;margin-bottom:8px;}
.flip-label{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:2px;color:var(–accent);margin-bottom:6px;}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
.zone-box{padding:8px 10px;border-radius:1px;}
.zone-box.buy{background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);}
.zone-box.sell{background:rgba(255,45,85,.06);border:1px solid rgba(255,45,85,.2);}
.zone-lbl{font-size:9px;letter-spacing:1px;margin-bottom:4px;}
.zone-lbl.buy{color:var(–bull);}
.zone-lbl.sell{color:var(–bear);}
.zone-price{font-family:‘Orbitron’,sans-serif;font-size:10px;font-weight:700;color:#fff;}
.sr-row{display:flex;gap:12px;margin-top:8px;font-size:10px;}
.sr-item{flex:1;padding:6px 8px;background:rgba(0,0,0,.2);border:1px solid var(–border);}
.sr-lbl{color:var(–dim);font-size:9px;margin-bottom:3px;}
.sr-val{color:#fff;font-family:‘Orbitron’,sans-serif;font-size:10px;}

.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;}
.spin{width:44px;height:44px;border:2px solid var(–border);border-top-color:var(–accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:‘Orbitron’,sans-serif;font-size:11px;letter-spacing:4px;color:var(–dim);}
.err{background:rgba(255,45,85,.08);border:1px solid var(–bear);color:var(–bear);padding:20px;font-size:12px;line-height:2;}
.disc{font-size:9px;color:var(–dim);text-align:center;padding:14px;border-top:1px solid var(–border);opacity:.6;}

/* Section labels */
.section-label{font-family:‘Orbitron’,sans-serif;font-size:9px;letter-spacing:4px;color:var(–dim);margin-bottom:10px;margin-top:4px;}

/* Search bar */
.search-wrap{position:relative;margin-bottom:14px;}
.search-input{width:100%;background:#050c18;border:1px solid var(–border);color:#fff;font-family:‘Share Tech Mono’,monospace;font-size:13px;padding:10px 44px 10px 16px;outline:none;transition:border-color .2s;letter-spacing:1px;}
.search-input::placeholder{color:#2a3d52;opacity:1;}
.search-input:focus{border-color:var(–dim);color:#fff;}
.search-icon{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(–dim);font-size:16px;pointer-events:none;opacity:.4;}
.search-results{position:absolute;top:100%;left:0;right:0;background:#070d1a;border:1px solid var(–border);border-top:none;z-index:100;max-height:240px;overflow-y:auto;}
.search-result{padding:10px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(–border);transition:background .15s;}
.search-result:last-child{border-bottom:none;}
.search-result:hover,.search-result.focused{background:rgba(255,255,255,.04);}
.sr-symbol{font-family:‘Orbitron’,sans-serif;font-size:13px;font-weight:700;color:var(–text);}
.sr-name{font-size:11px;color:var(–dim);}
.sr-tag{font-size:9px;color:var(–dim);letter-spacing:1px;}
.search-hint{padding:10px 16px;font-size:11px;color:var(–dim);text-align:center;}
.search-err{padding:10px 16px;font-size:11px;color:var(–bear);}
.custom-coin-badge{display:inline-block;font-family:‘Orbitron’,sans-serif;font-size:8px;padding:2px 7px;background:rgba(168,85,247,.15);border:1px solid #a855f7;color:#a855f7;letter-spacing:1px;margin-left:8px;vertical-align:middle;}

/* Top 5 */
.top5-panel{background:var(–panel);border:1px solid var(–border);padding:20px;margin-bottom:18px;position:relative;overflow:hidden;}
.top5-panel::before{content:’’;position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(–bull),transparent);}
.top5-header{font-family:‘Orbitron’,sans-serif;font-size:10px;letter-spacing:3px;color:var(–bull);margin-bottom:4px;}
.top5-sub{font-size:10px;color:var(–dim);margin-bottom:16px;letter-spacing:1px;}
.top5-scanning{display:flex;align-items:center;gap:10px;color:var(–dim);font-size:11px;padding:12px 0;}
.top5-spin{width:16px;height:16px;border:2px solid var(–border);border-top-color:var(–bull);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}
.top5-empty{color:var(–dim);font-size:11px;padding:10px 0;}
.top5-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(–border);transition:background .15s;}
.top5-row:hover{background:rgba(0,200,255,.05);}
.top5-row:last-child{border-bottom:none;}
.top5-first{background:rgba(0,255,136,.03);margin:0 -20px;padding:12px 20px;border-bottom:1px solid rgba(0,255,136,.1);}
.top5-rank{font-size:22px;min-width:30px;margin-top:2px;}
.top5-info{flex:1;min-width:0;}
.top5-sym{font-family:‘Orbitron’,sans-serif;font-size:15px;font-weight:700;color:#fff;}
.top5-name{font-size:11px;color:var(–dim);font-family:‘Share Tech Mono’,monospace;font-weight:400;}
.top5-reason{font-size:10px;color:#7fc8a8;margin-top:4px;line-height:1.5;}
.top5-zones{font-size:9px;color:var(–dim);margin-top:4px;letter-spacing:.5px;}
.top5-right{text-align:right;min-width:70px;}
.top5-score{font-family:‘Orbitron’,sans-serif;font-size:20px;font-weight:700;line-height:1;}
.top5-chg{font-size:11px;font-weight:bold;margin-top:3px;}
.top5-bar{height:3px;background:var(–border);border-radius:2px;margin-top:6px;overflow:hidden;}
.top5-bar-fill{height:100%;border-radius:2px;}
</style>

</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">SIGNAL<span>LAB</span></div>
    <div class="hdr-right">
      <div class="live-dot"></div>
      <span class="stxt" id="status">CONNECTING...</span>
      <span class="cd">NEXT: <b id="cd">15:00</b></span>
      <button class="rbtn" onclick="start()">↻ REFRESH</button>
    </div>
  </header>
  <div class="tokens" id="tokens"></div>
  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="🔍  SEARCH ANY COIN  e.g. SHIB, ARB, INJ, WIF..." autocomplete="off" autocorrect="off" spellcheck="false" oninput="onSearch(this.value)" onkeydown="onSearchKey(event)"/>
    <span class="search-icon">⌕</span>
    <div class="search-results" id="searchResults" style="display:none"></div>
  </div>
  <div id="app"><div class="loader"><div class="spin"></div><div class="ltxt">LOADING...</div></div></div>
  <div class="disc">⚠ NOT FINANCIAL ADVICE · EDUCATIONAL USE ONLY · LIVE DATA VIA PUBLIC APIs</div>
</div>

<script>
const COINS=[
  {id:'BTC-USD',label:'BTC',name:'Bitcoin',kp:'XXBTZUSD',cg:'bitcoin'},
  {id:'ETH-USD',label:'ETH',name:'Ethereum',kp:'XETHZUSD',cg:'ethereum'},
  {id:'SOL-USD',label:'SOL',name:'Solana',kp:'SOLUSD',cg:'solana'},
  {id:'DOGE-USD',label:'DOGE',name:'Dogecoin',kp:'XDGUSD',cg:'dogecoin'},
  {id:'PEPE-USD',label:'PEPE',name:'Pepe',kp:'PEPEUSD',cg:'pepe'},
  {id:'XRP-USD',label:'XRP',name:'XRP',kp:'XXRPZUSD',cg:'ripple'},
];

// Wider scan list for Top 5 — includes button coins + more
const SCAN_COINS=[
  {label:'BTC', name:'Bitcoin',   kp:'XXBTZUSD', cg:'bitcoin'},
  {label:'ETH', name:'Ethereum',  kp:'XETHZUSD', cg:'ethereum'},
  {label:'SOL', name:'Solana',    kp:'SOLUSD',   cg:'solana'},
  {label:'XRP', name:'XRP',       kp:'XXRPZUSD', cg:'ripple'},
  {label:'BNB', name:'BNB',       kp:'BNBUSD',   cg:'binancecoin'},
  {label:'DOGE',name:'Dogecoin',  kp:'XDGUSD',   cg:'dogecoin'},
  {label:'ADA', name:'Cardano',   kp:'ADAUSD',   cg:'cardano'},
  {label:'AVAX',name:'Avalanche', kp:'AVAXUSD',  cg:'avalanche-2'},
  {label:'LINK',name:'Chainlink', kp:'LINKUSD',  cg:'chainlink'},
  {label:'DOT', name:'Polkadot',  kp:'DOTUSD',   cg:'polkadot'},
  {label:'MATIC',name:'Polygon',  kp:'MATICUSD', cg:'matic-network'},
  {label:'PEPE',name:'Pepe',      kp:'PEPEUSD',  cg:'pepe'},
  {label:'SUI', name:'Sui',       kp:'SUIUSD',   cg:'sui'},
  {label:'TON', name:'Toncoin',   kp:'TONUSD',   cg:'the-open-network'},
  {label:'LTC', name:'Litecoin',  kp:'XLTCZUSD', cg:'litecoin'},
];

const TFS=[
  {key:'24h', label:'24 HOURS', ki:60,   kc:24,  cgd:1,   cgp:24},
  {key:'7d',  label:'1 WEEK',   ki:240,  kc:42,  cgd:7,   cgp:42},
  {key:'30d', label:'1 MONTH',  ki:1440, kc:30,  cgd:30,  cgp:30},
  {key:'90d', label:'3 MONTHS', ki:1440, kc:90,  cgd:90,  cgp:90},
  {key:'180d',label:'6 MONTHS', ki:1440, kc:180, cgd:180, cgp:180},
];

// Scalp = 1m/5m/15m candles → use 15m (Kraken interval=15) and 1h
// Day trade = 1h/4h candles

// ── APIs ──────────────────────────────────────────────────────────────────────
async function krakenOHLC(pair,intervalMin,count){
  const since=Math.floor(Date.now()/1000)-intervalMin*60*(count+5);
  const r=await fetch(`https://api.kraken.com/0/public/OHLC?pair=${pair}&interval=${intervalMin}&since=${since}`);
  if(!r.ok)throw new Error('Kraken '+r.status);
  const d=await r.json();
  if(d.error&&d.error.length)throw new Error(d.error[0]);
  const key=Object.keys(d.result).find(k=>k!=='last');
  return(d.result[key]||[]).slice(-count).map(r=>({open:+r[1],high:+r[2],low:+r[3],close:+r[4],volume:+r[6]}));
}
async function krakenTicker(pair){
  const r=await fetch(`https://api.kraken.com/0/public/Ticker?pair=${pair}`);
  if(!r.ok)throw new Error('K ticker '+r.status);
  const d=await r.json();
  const k=Object.keys(d.result)[0],t=d.result[k];
  return{price:+t.c[0],open24:+t.o,hi24:+t.h[1],lo24:+t.l[1],vol24:+t.v[1]};
}
async function cgCandles(cgId,days,points){
  const r=await fetch(`https://api.coingecko.com/api/v3/coins/${cgId}/market_chart?vs_currency=usd&days=${days}`);
  if(!r.ok)throw new Error('CG '+r.status);
  const d=await r.json();
  const prices=d.prices||[];
  const step=Math.max(1,Math.floor(prices.length/points));
  const out=[];
  for(let i=step;i<prices.length;i+=step){
    const sl=prices.slice(i-step,i).map(p=>p[1]);
    out.push({open:sl[0],high:Math.max(...sl),low:Math.min(...sl),close:sl[sl.length-1],volume:0});
  }
  return out;
}
async function cgTicker(cgId){
  const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${cgId}&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true&include_high_24h=true&include_low_24h=true`);
  if(!r.ok)throw new Error('CG ticker '+r.status);
  const d=await r.json(),c=d[cgId];
  return{price:c.usd,open24:0,hi24:c.usd_24h_high||0,lo24:c.usd_24h_low||0,vol24:c.usd_24h_vol||0,chg24:c.usd_24h_change||0};
}

// ── Math ──────────────────────────────────────────────────────────────────────
const C=k=>k.map(x=>x.close),H=k=>k.map(x=>x.high),L=k=>k.map(x=>x.low),V=k=>k.map(x=>x.volume);
function sma(a,n){if(a.length<n)return null;return a.slice(-n).reduce((s,v)=>s+v,0)/n;}
function ema(a,n){if(a.length<n)return null;const k=2/(n+1);let e=a.slice(0,n).reduce((s,v)=>s+v,0)/n;for(let i=n;i<a.length;i++)e=a[i]*k+e*(1-k);return e;}
function rsi(a,n=14){if(a.length<n+1)return null;let g=0,l=0;for(let i=a.length-n;i<a.length;i++){const d=a[i]-a[i-1];d>0?g+=d:l-=d;}const al=l/n;if(al===0)return 100;return 100-100/(1+g/n/al);}
function macd(a){if(a.length<35)return null;const vals=[];for(let i=26;i<=a.length;i++){const e12=ema(a.slice(0,i),12),e26=ema(a.slice(0,i),26);if(e12&&e26)vals.push(e12-e26);}if(vals.length<9)return null;const cur=vals[vals.length-1],sig=ema(vals,9);return{cur,sig,hist:sig?cur-sig:null};}
function boll(a,n=20){const m=sma(a,n);if(!m)return null;const s=a.slice(-n),std=Math.sqrt(s.reduce((acc,p)=>acc+Math.pow(p-m,2),0)/n);return{upper:m+2*std,mid:m,lower:m-2*std};}
function stochRsi(a,n=14){const r=rsi(a,n);if(r===null)return null;const s=a.slice(-n),mn=Math.min(...s),mx=Math.max(...s);if(mx===mn)return 50;return((a[a.length-1]-mn)/(mx-mn))*100;}
function willR(c,h,l,n=14){const hh=Math.max(...h.slice(-n)),ll=Math.min(...l.slice(-n));if(hh===ll)return -50;return((hh-c[c.length-1])/(hh-ll))*-100;}
function cci(a,n=20){const m=sma(a,n);if(!m)return null;const md=a.slice(-n).reduce((acc,p)=>acc+Math.abs(p-m),0)/n;if(md===0)return 0;return(a[a.length-1]-m)/(0.015*md);}
function atr(h,l,c,n=14){if(h.length<n+1)return null;let sum=0;for(let i=h.length-n;i<h.length;i++)sum+=Math.max(h[i]-l[i],Math.abs(h[i]-c[i-1]),Math.abs(l[i]-c[i-1]));return sum/n;}
function momentum(a,n=10){if(a.length<n+1)return null;return((a[a.length-1]-a[a.length-1-n])/a[a.length-1-n])*100;}

// ── Full analysis (for timeframe cards) ───────────────────────────────────────
function analyze(candles){
  if(!candles||candles.length<15)return null;
  const c=C(candles),h=H(candles),l=L(candles),v=V(candles);
  const cur=c[c.length-1],chg=((cur-c[0])/c[0])*100;
  let bull=0,bear=0,tot=0;const sigs=[];
  function add(name,value,sig,label){sigs.push({name,value,signal:sig,label});if(sig==='bull')bull++;else if(sig==='bear')bear++;tot++;}
  add('Price Action',(chg>=0?'+':'')+chg.toFixed(2)+'%',chg>=0?'bull':'bear',chg>=0?'BULLISH':'BEARISH');
  const r=rsi(c);if(r!==null){let s,lb;if(r<35){s='bull';lb='OVERSOLD';}else if(r>65){s='bear';lb='OVERBOUGHT';}else if(r>=50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('RSI (14)',r.toFixed(1),s,lb);}
  const md=macd(c);if(md&&md.hist!==null)add('MACD',md.cur.toFixed(6),md.hist>0?'bull':'bear',md.hist>0?'BULLISH':'BEARISH');
  const bb=boll(c);if(bb){let s,lb;if(cur<bb.lower){s='bull';lb='BELOW LOWER';}else if(cur>bb.upper){s='bear';lb='ABOVE UPPER';}else if(cur>bb.mid){s='bull';lb='ABOVE MID';}else{s='bear';lb='BELOW MID';}add('Bollinger Bands','M:'+fmt(bb.mid),s,lb);}
  const s20=sma(c,20);if(s20)add('vs SMA20',fmt(s20),cur>s20?'bull':'bear',cur>s20?'ABOVE':'BELOW');
  const s50=sma(c,Math.min(50,c.length));if(s50&&c.length>=30)add('vs SMA50',fmt(s50),cur>s50?'bull':'bear',cur>s50?'ABOVE':'BELOW');
  const e9=ema(c,9),e21=ema(c,Math.min(21,c.length));if(e9&&e21)add('EMA 9/21',fmt(e9)+'/'+fmt(e21),e9>e21?'bull':'bear',e9>e21?'GOLDEN X':'DEATH X');
  const sr=stochRsi(c);if(sr!==null){let s,lb;if(sr<20){s='bull';lb='OVERSOLD';}else if(sr>80){s='bear';lb='OVERBOUGHT';}else if(sr>50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('Stoch RSI',sr.toFixed(1),s,lb);}
  const wr=willR(c,h,l);if(wr!==null){let s,lb;if(wr<-80){s='bull';lb='OVERSOLD';}else if(wr>-20){s='bear';lb='OVERBOUGHT';}else if(wr>-50){s='bear';lb='BEARISH';}else{s='bull';lb='BULLISH';}add('Williams %R',wr.toFixed(1),s,lb);}
  const ci=cci(c);if(ci!==null){let s,lb;if(ci<-100){s='bull';lb='OVERSOLD';}else if(ci>100){s='bear';lb='OVERBOUGHT';}else if(ci>0){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('CCI (20)',ci.toFixed(1),s,lb);}
  const avgV=v.slice(0,-1).reduce((a,b)=>a+b,0)/Math.max(v.length-1,1);const vr=avgV>0?v[v.length-1]/avgV:1;
  add('Volume vs Avg',vr.toFixed(2)+'x',vr>1.2?(chg>=0?'bull':'bear'):'neut',vr>1.5?'SURGE':vr>1?'ABOVE AVG':'BELOW AVG');
  const bullScore=tot>0?(bull/tot)*100:50;
  return{verdict:bullScore>=62?'BULLISH':bullScore<=38?'BEARISH':'NEUTRAL',bullScore,bearScore:100-bullScore,sigs,chg,cur};
}

// ── Exhaustion Engine — used by both scalp and day trade ──────────────────────
function detectExhaustion(c,h,l,v,rsiVal,srsiVal,wrVal,intervalLabel,curPrice){
  // How many candles back to check for divergence
  const lookback=Math.min(8,c.length-2);
  const prev=c.slice(-lookback-1,-1);
  const prevHi=h.slice(-lookback-1,-1);
  const prevLo=l.slice(-lookback-1,-1);
  const cur=c[c.length-1];

  // ── Exhaustion signals ────────────────────────────────────────────────────
  let exhaustScore=0, exhaustSigns=[], flipDir='', urgency='';

  // 1. RSI extreme + divergence
  if(rsiVal!==null){
    if(rsiVal>75){
      exhaustScore+=30;exhaustSigns.push('RSI extremely overbought ('+rsiVal.toFixed(0)+')');
    } else if(rsiVal>65&&cur>Math.max(...prev)){
      // price made new high but RSI lower than recent — bearish divergence
      exhaustScore+=20;exhaustSigns.push('RSI bearish divergence — new price high, RSI lagging');
    }
    if(rsiVal<25){
      exhaustScore+=30;exhaustSigns.push('RSI extremely oversold ('+rsiVal.toFixed(0)+')');
    } else if(rsiVal<35&&cur<Math.min(...prev)){
      exhaustScore+=20;exhaustSigns.push('RSI bullish divergence — new price low, RSI rising');
    }
  }

  // 2. Stoch RSI at extremes
  if(srsiVal!==null){
    if(srsiVal>90){exhaustScore+=25;exhaustSigns.push('Stoch RSI maxed out ('+srsiVal.toFixed(0)+')');}
    else if(srsiVal>80){exhaustScore+=12;exhaustSigns.push('Stoch RSI overbought zone');}
    if(srsiVal<10){exhaustScore+=25;exhaustSigns.push('Stoch RSI bottomed out ('+srsiVal.toFixed(0)+')');}
    else if(srsiVal<20){exhaustScore+=12;exhaustSigns.push('Stoch RSI oversold zone');}
  }

  // 3. Williams %R extreme
  if(wrVal!==null){
    if(wrVal>-5){exhaustScore+=20;exhaustSigns.push('Williams %R at ceiling ('+wrVal.toFixed(0)+')');}
    else if(wrVal>-15){exhaustScore+=10;exhaustSigns.push('Williams %R near ceiling');}
    if(wrVal<-95){exhaustScore+=20;exhaustSigns.push('Williams %R at floor ('+wrVal.toFixed(0)+')');}
    else if(wrVal<-85){exhaustScore+=10;exhaustSigns.push('Williams %R near floor');}
  }

  // 4. Volume divergence — price moving but volume drying up
  if(v.length>5){
    const recentVol=v.slice(-3).reduce((a,b)=>a+b,0)/3;
    const priorVol=v.slice(-8,-3).reduce((a,b)=>a+b,0)/5;
    const volFading=recentVol<priorVol*0.6;
    const priceExtended=Math.abs(cur-c[c.length-5])/c[c.length-5]*100>1.5;
    if(volFading&&priceExtended){exhaustScore+=20;exhaustSigns.push('Volume fading on price extension — weak hands');}
  }

  // 5. Consecutive same-direction candles (overextension)
  let streak=0;
  for(let i=c.length-1;i>c.length-6&&i>0;i--){
    if(c[i]>c[i-1])streak++;else break;
  }
  if(streak>=4){exhaustScore+=15;exhaustSigns.push(streak+' consecutive bullish candles — overextended');}
  streak=0;
  for(let i=c.length-1;i>c.length-6&&i>0;i--){
    if(c[i]<c[i-1])streak++;else break;
  }
  if(streak>=4){exhaustScore+=15;exhaustSigns.push(streak+' consecutive bearish candles — overextended');}

  // ── Determine flip direction and timing ──────────────────────────────────
  const topExhaustion = (rsiVal&&rsiVal>60)||(srsiVal&&srsiVal>70)||(wrVal&&wrVal>-25);
  const botExhaustion = (rsiVal&&rsiVal<40)||(srsiVal&&srsiVal<30)||(wrVal&&wrVal<-75);

  if(topExhaustion&&exhaustScore>20) flipDir='BEARISH FLIP';
  else if(botExhaustion&&exhaustScore>20) flipDir='BULLISH FLIP';

  // Estimate candles until flip based on score
  let candlesOut=0, timeEst='';
  if(exhaustScore>=60){candlesOut=1;urgency='IMMINENT';}
  else if(exhaustScore>=40){candlesOut=2;urgency='VERY SOON';}
  else if(exhaustScore>=25){candlesOut=4;urgency='APPROACHING';}
  else if(exhaustScore>=15){candlesOut=8;urgency='WATCH';}
  else{urgency='NO SIGNAL';}

  if(candlesOut>0){
    const mins=candlesOut*(intervalLabel==='15m'?15:60);
    if(mins<60) timeEst=`~${mins} min`;
    else timeEst=`~${(mins/60).toFixed(1)} hr`;
  }

  // ── Buy/Sell zone prices ──────────────────────────────────────────────────
  const atVal=atr(h,l,c)||curPrice*0.005;
  const buyZoneLow=fmt(curPrice-atVal*1.5);
  const buyZoneHigh=fmt(curPrice-atVal*0.5);
  const sellZoneLow=fmt(curPrice+atVal*0.5);
  const sellZoneHigh=fmt(curPrice+atVal*1.5);

  // Support/resistance — recent swing high/low
  const recentHigh=Math.max(...h.slice(-lookback));
  const recentLow=Math.min(...l.slice(-lookback));

  return{
    exhaustScore:Math.min(exhaustScore,100),
    exhaustSigns,
    flipDir,
    urgency,
    timeEst,
    buyZone:{low:buyZoneLow,high:buyZoneHigh},
    sellZone:{low:sellZoneLow,high:sellZoneHigh},
    support:fmt(recentLow),
    resistance:fmt(recentHigh),
    topExhaustion,botExhaustion
  };
}

// ── Scalp Analysis (15m candles — fast momentum signals) ──────────────────────
function analyzeScalp(candles15m){
  if(!candles15m||candles15m.length<10)return null;
  const c=C(candles15m),h=H(candles15m),l=L(candles15m),v=V(candles15m);
  const cur=c[c.length-1];
  const sigs=[];let bull=0,bear=0,tot=0;
  function add(name,val,sig,label){sigs.push({name,val,sig,label});if(sig==='bull')bull++;else if(sig==='bear')bear++;tot++;}

  const r7=rsi(c,7);
  if(r7!==null){let s,lb;if(r7<30){s='bull';lb='OVERSOLD';}else if(r7>70){s='bear';lb='OVERBOUGHT';}else if(r7>=50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('RSI Fast (7)',r7.toFixed(1),s,lb);}
  const sr=stochRsi(c,10);
  if(sr!==null){let s,lb;if(sr<15){s='bull';lb='OVERSOLD';}else if(sr>85){s='bear';lb='OVERBOUGHT';}else if(sr>50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('Stoch RSI',sr.toFixed(1),s,lb);}
  const e5=ema(c,5),e13=ema(c,13);
  if(e5&&e13)add('EMA 5/13',fmt(e5)+'/'+fmt(e13),e5>e13?'bull':'bear',e5>e13?'BULL CROSS':'BEAR CROSS');
  const md=macd(c);
  if(md&&md.hist!==null)add('MACD Hist',md.hist>0?'POSITIVE':'NEGATIVE',md.hist>0?'bull':'bear',md.hist>0?'BULLISH':'BEARISH');
  const bb=boll(c,15);
  if(bb){const bw=(bb.upper-bb.lower)/bb.mid*100;let s,lb;if(cur>bb.upper){s='bear';lb='OVERBOUGHT';}else if(cur<bb.lower){s='bull';lb='OVERSOLD';}else if(cur>bb.mid&&bw<3){s='bull';lb='SQUEEZE UP';}else if(cur<bb.mid&&bw<3){s='bear';lb='SQUEEZE DOWN';}else if(cur>bb.mid){s='bull';lb='ABOVE MID';}else{s='bear';lb='BELOW MID';}add('BB (15)',fmt(bb.mid),s,lb);}
  const mom=momentum(c,5);
  if(mom!==null)add('Momentum',mom.toFixed(3)+'%',mom>0?'bull':'bear',mom>0?'POSITIVE':'NEGATIVE');
  const wr=willR(c,h,l,8);
  if(wr!==null){let s,lb;if(wr<-80){s='bull';lb='OVERSOLD';}else if(wr>-20){s='bear';lb='OVERBOUGHT';}else if(wr>-50){s='bear';lb='BEARISH';}else{s='bull';lb='BULLISH';}add('Williams %R',wr.toFixed(1),s,lb);}
  const avgV=v.slice(0,-1).reduce((a,b)=>a+b,0)/Math.max(v.length-1,1);
  const vr=avgV>0?v[v.length-1]/avgV:1;
  add('Vol Surge',vr.toFixed(2)+'x',vr>1.3?(c[c.length-1]>c[c.length-2]?'bull':'bear'):'neut',vr>2?'STRONG SURGE':vr>1.3?'SURGE':'NORMAL');

  const bullScore=tot>0?(bull/tot)*100:50;
  const verdict=bullScore>=60?'BULLISH':bullScore<=40?'BEARISH':'NEUTRAL';

  let advice='';
  if(verdict==='BULLISH') advice='Momentum favors LONG scalps. Look for pullbacks to EMA5 for entries. Keep stops tight — 0.3–0.5% below entry.';
  else if(verdict==='BEARISH') advice='Momentum favors SHORT scalps. Watch for bounces into EMA5 resistance. Tight stops 0.3–0.5% above entry.';
  else advice='Mixed signals — avoid scalping until a clearer direction prints. Wait for RSI + EMA alignment.';

  const exhaust=detectExhaustion(c,h,l,v,r7,sr,wr,'15m',cur);
  return{verdict,bullScore,bearScore:100-bullScore,sigs,advice,exhaust};
}

// ── Day Trade Analysis (1h + 4h candles) ──────────────────────────────────────
function analyzeDayTrade(candles1h, candles4h){
  if(!candles1h||candles1h.length<14)return null;
  const c1=C(candles1h),h1=H(candles1h),l1=L(candles1h),v1=V(candles1h);
  const c4=candles4h?C(candles4h):null;
  const cur=c1[c1.length-1];
  const sigs=[];let bull=0,bear=0,tot=0;
  function add(name,val,sig,label){sigs.push({name,val,sig,label});if(sig==='bull')bull++;else if(sig==='bear')bear++;tot++;}

  // RSI(14) on 1h
  const r=rsi(c1);
  if(r!==null){let s,lb;if(r<40){s='bull';lb='OVERSOLD';}else if(r>60){s='bear';lb='OVERBOUGHT';}else if(r>=50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('RSI 1H',r.toFixed(1),s,lb);}

  // RSI on 4h (higher timeframe confirmation)
  if(c4&&c4.length>14){
    const r4=rsi(c4);
    if(r4!==null){let s,lb;if(r4<40){s='bull';lb='OVERSOLD';}else if(r4>60){s='bear';lb='OVERBOUGHT';}else if(r4>=50){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('RSI 4H (HTF)',r4.toFixed(1),s,lb);}
  }

  // MACD on 1h
  const md=macd(c1);
  if(md&&md.hist!==null)add('MACD 1H',md.hist>0?'POSITIVE':'NEGATIVE',md.hist>0?'bull':'bear',md.hist>0?'BULLISH':'BEARISH');

  // EMA 9/21 on 1h
  const e9=ema(c1,9),e21=ema(c1,Math.min(21,c1.length));
  if(e9&&e21)add('EMA 9/21 (1H)',fmt(e9)+'/'+fmt(e21),e9>e21?'bull':'bear',e9>e21?'BULLISH':'BEARISH');

  // SMA 20/50 trend
  const s20=sma(c1,20),s50=sma(c1,Math.min(50,c1.length));
  if(s20&&s50)add('SMA 20/50 (1H)',fmt(s20)+'/'+fmt(s50),s20>s50?'bull':'bear',s20>s50?'UPTREND':'DOWNTREND');
  if(s20)add('Price vs SMA20',fmt(s20),cur>s20?'bull':'bear',cur>s20?'ABOVE':'BELOW');

  // Bollinger on 1h
  const bb=boll(c1);
  if(bb){let s,lb;if(cur<bb.lower){s='bull';lb='BELOW LOWER';}else if(cur>bb.upper){s='bear';lb='ABOVE UPPER';}else if(cur>bb.mid){s='bull';lb='ABOVE MID';}else{s='bear';lb='BELOW MID';}add('BB (1H)',fmt(bb.mid),s,lb);}

  // ATR — volatility check
  const at=atr(h1,l1,c1);
  if(at!==null){const pct=(at/cur*100);add('ATR Volatility',pct.toFixed(2)+'%',pct>1.5?'neut':'neut',pct>2?'HIGH VOL':pct>1?'MODERATE':'LOW VOL');}

  // CCI on 1h
  const ci=cci(c1);
  if(ci!==null){let s,lb;if(ci<-100){s='bull';lb='OVERSOLD';}else if(ci>100){s='bear';lb='OVERBOUGHT';}else if(ci>0){s='bull';lb='BULLISH';}else{s='bear';lb='BEARISH';}add('CCI (1H)',ci.toFixed(1),s,lb);}

  // Momentum 1h
  const mom=momentum(c1,8);
  if(mom!==null)add('Momentum',mom.toFixed(3)+'%',mom>0?'bull':'bear',mom>0?'POSITIVE':'NEGATIVE');

  // Volume trend
  const avgV=v1.slice(0,-3).reduce((a,b)=>a+b,0)/Math.max(v1.length-3,1);
  const recentV=v1.slice(-3).reduce((a,b)=>a+b,0)/3;
  const vtr=avgV>0?recentV/avgV:1;
  add('Volume Trend',vtr.toFixed(2)+'x avg',vtr>1.1?(c1[c1.length-1]>c1[c1.length-4]?'bull':'bear'):'neut',vtr>1.5?'RISING VOL':vtr<0.7?'DRY':'NORMAL');

  const bullScore=tot>0?(bull/tot)*100:50;
  const verdict=bullScore>=62?'BULLISH':bullScore<=38?'BEARISH':'NEUTRAL';

  // Day trade advice
  let advice='';
  const at2=atr(h1,l1,c1);
  const atrPct=at2?((at2/cur)*100).toFixed(2):'?';
  if(verdict==='BULLISH') advice=`Bias is LONG for the session. ATR=${atrPct}% — use that for realistic targets. Look for 1H pullbacks to EMA9 or SMA20 as entry zones.`;
  else if(verdict==='BEARISH') advice=`Bias is SHORT for the session. ATR=${atrPct}% range expected. Watch for 1H bounces into EMA9/SMA20 as short entries.`;
  else advice=`No clear directional bias. Choppy conditions — wait for a break above/below the Bollinger midline on 1H with volume confirmation before entering.`;

  const rVal=rsi(c1);
  const srVal=stochRsi(c1);
  const wrVal=willR(c1,h1,l1);
  const exhaust=detectExhaustion(c1,h1,l1,v1,rVal,srVal,wrVal,'1h',cur);
  return{verdict,bullScore,bearScore:100-bullScore,sigs,advice,exhaust};
}

function fmt(n){if(n==null)return'N/A';if(n<0.000001)return'$'+n.toExponential(4);if(n<0.001)return'$'+n.toFixed(8);if(n<1)return'$'+n.toFixed(6);if(n<100)return'$'+n.toFixed(4);return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmtB(n){if(!n)return'—';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(2)+'K';return'$'+n.toFixed(2);}

function renderExhaustPanel(ex){
  if(!ex) return '';

  // Convert exhaustion data into a single BUY pressure score (0-100)
  // 0 = strong SELL (exhausted at top, flip bearish coming)
  // 50 = neutral
  // 100 = strong BUY (exhausted at bottom, flip bullish coming)
  let buyPressure = 50;

  if(ex.botExhaustion) buyPressure += ex.exhaustScore * 0.5;
  if(ex.topExhaustion) buyPressure -= ex.exhaustScore * 0.5;
  buyPressure = Math.max(2, Math.min(98, buyPressure));

  // Action label based on pressure
  let action, actionColor, actionBg, actionDesc, timeMsg;
  if(buyPressure >= 80){
    action='STRONG BUY'; actionColor='var(--bull)'; actionBg='rgba(0,255,136,.12)';
    actionDesc='Move is exhausted to the downside — high probability reversal incoming. Good entry zone.';
  } else if(buyPressure >= 62){
    action='BUY'; actionColor='var(--bull)'; actionBg='rgba(0,255,136,.07)';
    actionDesc='Indicators leaning toward a bullish reversal. Consider building a position.';
  } else if(buyPressure >= 55){
    action='LEAN BUY'; actionColor='#4ec994'; actionBg='rgba(78,201,148,.06)';
    actionDesc='Mild buy pressure. Early signal — wait for confirmation before entering.';
  } else if(buyPressure >= 45){
    action='NEUTRAL'; actionColor='var(--neutral)'; actionBg='rgba(240,180,41,.06)';
    actionDesc='No clear exhaustion signal in either direction. Hold current position.';
  } else if(buyPressure >= 38){
    action='LEAN SELL'; actionColor='#f07560'; actionBg='rgba(240,117,96,.06)';
    actionDesc='Mild sell pressure building. Consider tightening stops on longs.';
  } else if(buyPressure >= 20){
    action='SELL'; actionColor='var(--bear)'; actionBg='rgba(255,45,85,.08)';
    actionDesc='Move is getting exhausted at the top. Start taking profits — reversal likely.';
  } else {
    action='STRONG SELL'; actionColor='var(--bear)'; actionBg='rgba(255,45,85,.15)';
    actionDesc='Severely overbought and exhausted. High probability of sharp reversal. EXIT now.';
  }

  if(ex.timeEst) timeMsg=`Estimated flip: <b style="color:#fff">${ex.timeEst}</b>`;
  else timeMsg='No imminent flip detected';

  // The visual bar: left=SELL (red), right=BUY (green)
  // buyPressure 100 = far right = BUY, 0 = far left = SELL
  const needlePos = buyPressure;

  return`
    <div class="exhaust-panel">
      <div class="exhaust-title none">◈ BUY / SELL PRESSURE</div>

      <!-- Action badge -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div style="font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;color:${actionColor};text-shadow:0 0 20px ${actionColor}44;">${action}</div>
        <div style="font-size:10px;color:var(--dim);">${timeMsg}</div>
      </div>

      <!-- Single Buy/Sell bar: SELL on left, BUY on right -->
      <div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:9px;margin-bottom:5px;">
          <span style="color:var(--bull);font-family:'Orbitron',sans-serif;letter-spacing:1px;">◄ BUY</span>
          <span style="color:var(--dim);">NEUTRAL</span>
          <span style="color:var(--bear);font-family:'Orbitron',sans-serif;letter-spacing:1px;">SELL ►</span>
        </div>
        <div style="position:relative;height:14px;overflow:visible;background:linear-gradient(90deg,#00ff88,#00aa55 15%,#3a5570 45%,#3a5570 55%,#aa0033 85%,#6b0020);border-radius:7px;">
          <!-- Needle — blends in as a dark line -->
          <div style="position:absolute;top:-2px;bottom:-2px;width:4px;background:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.5);border-radius:2px;left:calc(${100-needlePos}% - 2px);transition:left .8s ease;"></div>
        </div>
        <div style="position:relative;height:16px;margin-top:4px;">
          <div style="position:absolute;left:calc(${100-needlePos}%);transform:translateX(-50%);font-size:9px;color:${actionColor};white-space:nowrap;font-family:'Orbitron',sans-serif;font-weight:700;">${Math.round(buyPressure)}%</div>
        </div>
      </div>

      <!-- Description -->
      <div style="font-size:11px;padding:10px 12px;border-left:2px solid ${actionColor};background:${actionBg};line-height:1.6;color:#cce;margin-bottom:12px;">
        ${actionDesc}
        ${ex.exhaustSigns.length>0?`<br><span style="color:var(--dim);font-size:10px;">Signals: ${ex.exhaustSigns.slice(0,2).join(' · ')}</span>`:''}
      </div>

      <!-- Buy/Sell zones and support/resistance -->
      <div class="zone-grid">
        <div class="zone-box buy">
          <div class="zone-lbl buy">🟢 BUY ZONE</div>
          <div class="zone-price">${ex.buyZone.low}</div>

// ── Day Trade Bullish Scorer — ranks coins by how hard they lean BUY on 1H+4H ──
function scoreDayTradeBull(candles1h, candles4h, price){
  if(!candles1h||candles1h.length<14) return null;
  const c1=C(candles1h), h1=H(candles1h), l1=L(candles1h), v1=V(candles1h);
  const cur=c1[c1.length-1];
  let score=0, reasons=[];

  // ── 1H signals ──────────────────────────────────────────────────────────

  // RSI 1H — above 50 and rising = bullish day trade
  const r1=rsi(c1);
  if(r1!==null){
    if(r1>60&&r1<75){score+=30;reasons.push('1H RSI bullish ('+r1.toFixed(0)+')');}
    else if(r1>50){score+=18;reasons.push('1H RSI above midline');}
    else if(r1>40){score+=5;}
    else if(r1<35){score-=20;}
  }

  // MACD 1H — positive and growing histogram = strong bull day trade
  const md=macd(c1);
  if(md&&md.hist!==null){
    if(md.hist>0&&md.cur>0){score+=25;reasons.push('1H MACD bullish crossover');}
    else if(md.hist>0){score+=12;reasons.push('1H MACD histogram positive');}
    else if(md.hist<0){score-=15;}
  }

  // EMA 9/21 cross on 1H — golden cross = day trade long signal
  const e9=ema(c1,9), e21=ema(c1,Math.min(21,c1.length));
  if(e9&&e21){
    if(e9>e21){score+=20;reasons.push('1H EMA golden cross');}
    else{score-=10;}
  }

  // Price above SMA20 on 1H = uptrend
  const s20=sma(c1,20);
  if(s20){
    if(cur>s20){score+=15;reasons.push('Price above 1H SMA20');}
    else{score-=10;}
  }

  // Stoch RSI 1H — mid zone rising = good entry, not yet overbought
  const sr=stochRsi(c1);
  if(sr!==null){
    if(sr>40&&sr<75){score+=15;reasons.push('Stoch RSI in bullish zone');}
    else if(sr>75){score-=10;reasons.push('Stoch RSI overbought on 1H');}
    else if(sr<25){score+=8;reasons.push('Stoch RSI oversold — reversal setup');}
  }

  // Bollinger — price above midline = bullish bias
  const bb=boll(c1);
  if(bb){
    if(cur>bb.mid&&cur<bb.upper){score+=12;reasons.push('Price above BB midline');}
    else if(cur>bb.upper){score-=8;}
    else if(cur<bb.mid){score-=8;}
  }

  // Momentum 1H — positive and building
  const mom=momentum(c1,6);
  if(mom!==null){
    if(mom>1&&mom<6){score+=12;reasons.push('Positive momentum building');}
    else if(mom>0){score+=5;}
    else if(mom<-3){score-=10;}
  }

  // Volume — rising volume on bullish candles = conviction
  const avgV=v1.slice(0,-3).reduce((a,b)=>a+b,0)/Math.max(v1.length-3,1);
  const recentV=v1.slice(-3).reduce((a,b)=>a+b,0)/3;
  const lastGreen=c1[c1.length-1]>c1[c1.length-2];
  if(recentV>avgV*1.2&&lastGreen){score+=15;reasons.push('Rising volume on bullish candles');}

  // ── 4H signals — higher TF confirmation adds weight ─────────────────────
  if(candles4h&&candles4h.length>14){
    const c4=C(candles4h);

    // 4H RSI bullish
    const r4=rsi(c4);
    if(r4!==null){
      if(r4>55&&r4<75){score+=20;reasons.push('4H RSI bullish ('+r4.toFixed(0)+')');}
      else if(r4>50){score+=10;}
      else if(r4<40){score-=15;}
    }

    // 4H MACD
    const md4=macd(c4);
    if(md4&&md4.hist!==null){
      if(md4.hist>0){score+=18;reasons.push('4H MACD bullish');}
      else{score-=12;}
    }

    // 4H EMA cross
    const e9_4=ema(c4,9), e21_4=ema(c4,Math.min(21,c4.length));
    if(e9_4&&e21_4){
      if(e9_4>e21_4){score+=15;reasons.push('4H EMA bullish');}
      else{score-=8;}
    }
  }

  // Penalise if exhaustion says top is in
  const exh=detectExhaustion(c1,h1,l1,v1,r1,sr,willR(c1,h1,l1),'1h',cur);
  if(exh.topExhaustion&&exh.exhaustScore>50){score-=30;reasons.push('Exhausted at top — bad day trade entry');}
  if(exh.botExhaustion&&exh.exhaustScore>40){score+=15;reasons.push('Bottom reversal building');}

  return {
    score: Math.max(0, Math.min(100, score + 20)),
    reasons,
    price: fmt(price||cur),
    buyZone: exh.buyZone,
    support: exh.support
  };
}

// ── Scan Top 5 Best Day Trade Buys ────────────────────────────────────────────
let top5Cache=null, top5Timestamp=0;

async function scanTop5(){
  if(top5Cache&&Date.now()-top5Timestamp<300000) return top5Cache;
  const results=[];
  const batches=[];
  for(let i=0;i<SCAN_COINS.length;i+=3) batches.push(SCAN_COINS.slice(i,i+3));

  for(const batch of batches){
    await Promise.allSettled(batch.map(async c=>{
      try{
        const [t1h,t4h,tk]=await Promise.all([
          krakenOHLC(c.kp,60,24),
          krakenOHLC(c.kp,240,12),
          krakenTicker(c.kp)
        ]);
        const entry=scoreDayTradeBull(t1h,t4h,tk.price);
        if(entry) results.push({...c, ...entry, chg24:((tk.price-tk.open24)/tk.open24*100)});
      }catch(e){}
    }));
    await new Promise(r=>setTimeout(r,300));
  }

  const ranked=results.filter(r=>r.score>40).sort((a,b)=>b.score-a.score).slice(0,5);
  top5Cache=ranked;
  top5Timestamp=Date.now();
  return ranked;
}

function renderTop5(ranked){
  if(!ranked||ranked.length===0) return `<div class="top5-empty">Scanning market... check back shortly.</div>`;
  // Store in global so pickTop5 can access by index safely
  window._top5Data = ranked;
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  return ranked.map((c,i)=>{
    const barW=Math.min(c.score,100);
    const barCol=c.score>=75?'var(--bull)':c.score>=60?'var(--neutral)':'#4a9f6f';
    const topReason=c.reasons.filter(r=>!r.includes('avoid')&&!r.includes('risky')&&!r.includes('overextended')).slice(0,2).join(' · ') || 'Technical setup aligning';
    return`<div class="top5-row ${i===0?'top5-first':''}" onclick="pickTop5(${i})" style="cursor:pointer;">
      <div class="top5-rank">${medals[i]}</div>
      <div class="top5-info">
        <div class="top5-sym">${c.label} <span class="top5-name">${c.name}</span> <span style="font-size:9px;color:var(--accent);letter-spacing:1px;">TAP TO ANALYZE →</span></div>
        <div style="font-family:'Orbitron',sans-serif;font-size:12px;color:#fff;margin-top:3px;">${c.price}</div>
        <div class="top5-reason">${topReason}</div>
        <div class="top5-zones">BUY ZONE ${c.buyZone.low} – ${c.buyZone.high} &nbsp;·&nbsp; SUPPORT ${c.support}</div>
      </div>
      <div class="top5-right">
        <div class="top5-score" style="color:${barCol}">${c.score}<span style="font-size:10px;color:var(--dim)">/100</span></div>
        <div class="top5-chg ${c.chg24>=0?'pos':'neg'}">${c.chg24>=0?'▲':'▼'}${Math.abs(c.chg24).toFixed(2)}%</div>
        <div class="top5-bar"><div class="top5-bar-fill" style="width:${barW}%;background:${barCol}"></div></div>
      </div>
    </div>`;
  }).join('');
}

function pickTop5(i){
  const data = window._top5Data;
  if(!data||!data[i]) return;
  const c = data[i];
  customCoin={id:c.label+'-USD', label:c.label, name:c.name, kp:c.kp, cg:c.cg, custom:true};
  coin=customCoin;
  renderTokens();
  window.scrollTo({top:0,behavior:'smooth'});
  start();
}

function render(ticker, analyses, scalpA, dayA, src){
  const chg24=ticker.chg24!=null?ticker.chg24:((ticker.price-ticker.open24)/Math.max(ticker.open24,0.000001)*100);
  const weights=[3,2,1.5,1,0.5];let wb=0,wt=0;
  TFS.forEach((tf,i)=>{const a=analyses[tf.key];if(a){wb+=a.bullScore*weights[i];wt+=weights[i];}});
  const oBull=wt>0?wb/wt:50,oV=oBull>=62?'BULLISH':oBull<=38?'BEARISH':'NEUTRAL';
  const oCls=oV==='BULLISH'?'bullish':oV==='BEARISH'?'bearish':'neutral';
  const tot=Object.values(analyses).reduce((a,v)=>a+(v?v.sigs.length:0),0);

  let h=`
    <div class="price-strip">
      <div><div class="sym">${coin.label}</div><div class="sym-sub">${coin.name.toUpperCase()} · ${src}</div></div>
      <div class="metas">
        ${ticker.hi24>0?`<div class="mi"><div class="ml">24H HIGH</div><div class="mv">${fmt(ticker.hi24)}</div></div>`:''}
        ${ticker.lo24>0?`<div class="mi"><div class="ml">24H LOW</div><div class="mv">${fmt(ticker.lo24)}</div></div>`:''}
        <div class="mi"><div class="ml">VOL 24H</div><div class="mv">${fmtB(ticker.vol24)}</div></div>
      </div>
      <div style="text-align:right">
        <div class="pval">${fmt(ticker.price)}</div>
        <div class="pchg ${chg24>=0?'pos':'neg'}">${chg24>=0?'▲':'▼'} ${Math.abs(chg24).toFixed(2)}% 24H</div>
      </div>
    </div>

    <div class="vbox ${oCls}">
      <div class="vt">◈ OVERALL SIGNAL — ALL TIMEFRAMES ◈</div>
      <div class="vv ${oV}">${oV}</div>
      <div class="vs">BULL ${oBull.toFixed(0)}% · BEAR ${(100-oBull).toFixed(0)}% · ${tot} READINGS</div>
    </div>

    <div class="section-label">◈ ACTIVE TRADING SIGNALS</div>
    <div class="trade-grid">
      ${renderTradeCard('scalp','SCALP SIGNAL','15-MIN CANDLES · 12H WINDOW', scalpA)}
      ${renderTradeCard('daytrade','DAY TRADE SIGNAL','1H + 4H CANDLES · SESSION BIAS', dayA)}
    </div>

    <div class="section-label">◈ TOP 5 BEST DAY TRADE BUY SETUPS RIGHT NOW</div>
    <div class="top5-panel">
      <div class="top5-header">◈ DAY TRADE BUYS — RANKED #1 TO #5</div>
      <div class="top5-sub">SCANNING ${SCAN_COINS.length} COINS · SCORED ON 1H + 4H BULLISH MOMENTUM, MACD, EMA CROSS & VOLUME</div>
      <div id="top5-content"><div class="top5-scanning"><div class="top5-spin"></div>Scanning market for best entries...</div></div>
    </div>

    <div class="section-label">◈ SWING / POSITION TIMEFRAMES</div>
    <div class="tfg">`;

  TFS.forEach(tf=>{
    const a=analyses[tf.key];
    if(!a){h+=`<div class="tf neutral"><div class="tfl">TIMEFRAME</div><div class="tfp">${tf.label}</div><div class="tfs" style="margin-top:12px">NO DATA</div></div>`;return;}
    const cls=a.verdict==='BULLISH'?'bullish':a.verdict==='BEARISH'?'bearish':'neutral';
    const bc=cls==='bullish'?'bull':cls==='bearish'?'bear':'neut';
    const score=cls==='bullish'?a.bullScore:a.bearScore;
    h+=`<div class="tf ${cls}">
      <div class="tf-top"><div><div class="tfl">TIMEFRAME</div><div class="tfp">${tf.label}</div></div><div class="badge ${a.verdict}">${a.verdict}</div></div>
      <div class="bl"><span>${a.verdict}</span><span>${score.toFixed(0)}%</span></div>
      <div class="bt"><div class="bf ${bc}" style="width:${score}%"></div></div>
      <div class="bt" style="height:5px;background:linear-gradient(90deg,rgba(0,255,136,.5) ${a.bullScore}%,rgba(255,45,85,.5) ${a.bullScore}%)"></div>
      <div class="tfs">${a.sigs.filter(s=>s.signal==='bull').length}🟢 ${a.sigs.filter(s=>s.signal==='bear').length}🔴 ${a.sigs.filter(s=>s.signal==='neut').length}⚪ · ${a.chg>=0?'+':''}${a.chg.toFixed(2)}%</div>
    </div>`;
  });

  h+=`</div><div class="section-label">◈ INDICATOR BREAKDOWN</div><div class="ig">`;
  ['24h','7d'].forEach(key=>{
    const a=analyses[key],tf=TFS.find(t=>t.key===key);if(!a)return;
    h+=`<div class="ip"><div class="it">◈ ${tf.label} — INDICATORS</div>${a.sigs.map(s=>`<div class="ir"><span class="in">${s.name}</span><span class="iv">${s.value}</span><span class="is ${s.signal}">${s.label}</span></div>`).join('')}</div>`;
  });
  h+=`</div>`;

  document.getElementById('app').innerHTML=h;
  document.getElementById('status').textContent=`LIVE (${src}) · ${new Date().toLocaleTimeString()}`;
}

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function start(){
  showLoader();clearInterval(cdTimer);
  try{
    const [ticker, scalpC, dayC1h, dayC4h, ...swingCandles]=await Promise.all([
      krakenTicker(coin.kp),
      krakenOHLC(coin.kp, SCALP_TF.ki, SCALP_TF.kc),
      krakenOHLC(coin.kp, DAY_TF.ki,   DAY_TF.kc),
      krakenOHLC(coin.kp, DAY_TF2.ki,  DAY_TF2.kc),
      ...TFS.map(tf=>krakenOHLC(coin.kp,tf.ki,tf.kc))
    ]);
    const analyses={};TFS.forEach((tf,i)=>{analyses[tf.key]=analyze(swingCandles[i]);});
    const scalpA=analyzeScalp(scalpC);
    const dayA=analyzeDayTrade(dayC1h,dayC4h);
    render(ticker,analyses,scalpA,dayA,'KRAKEN');startCd();
    scanTop5().then(ranked=>{const el=document.getElementById('top5-content');if(el)el.innerHTML=renderTop5(ranked);});
  }catch(e1){
    try{
      const [ticker, scalpC, dayC1h, ...swingCandles]=await Promise.all([
        cgTicker(coin.cg),
        cgCandles(coin.cg,SCALP_TF.cgd,SCALP_TF.cgp),
        cgCandles(coin.cg,DAY_TF.cgd,DAY_TF.cgp),
        ...TFS.map(tf=>cgCandles(coin.cg,tf.cgd,tf.cgp))
      ]);
      const analyses={};TFS.forEach((tf,i)=>{analyses[tf.key]=analyze(swingCandles[i]);});
      const scalpA=analyzeScalp(scalpC);
      const dayA=analyzeDayTrade(dayC1h,null);
      render(ticker,analyses,scalpA,dayA,'COINGECKO');startCd();
      scanTop5().then(ranked=>{const el=document.getElementById('top5-content');if(el)el.innerHTML=renderTop5(ranked);});
    }catch(e2){
      document.getElementById('app').innerHTML=`<div class="err">⚠ Both APIs failed. Open this file directly in your browser (not inside Claude).<br>Kraken: ${e1.message} | CoinGecko: ${e2.message}</div>`;
    }
  }
}
function startCd(){cdVal=60;clearInterval(cdTimer);cdTimer=setInterval(()=>{cdVal--;const el=document.getElementById('cd');if(el)el.textContent=cdVal+'s';if(cdVal<=0){clearInterval(cdTimer);start();}},1000);}
renderTokens();start();
</script>
